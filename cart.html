<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WorkWise - Your Job Applications Cart</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="assets/cart.css">
  <style>
    /* Fix header consistency */
    #header-placeholder {
      position: sticky;
      top: 0;
      z-index: 1000;
      background-color: white;
    }
    
    /* Ensure footer stays at bottom */
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    .container {
      flex: 1;
    }
  </style>
</head>

<body>
  <!-- Include the header -->
  <div id="header-placeholder"></div>

  <div class="container mt-5">
    <h2 class="text-center mb-4">Your Job Applications Cart</h2>
    <div id="cart-items" class="row">
      <div class="col-12 text-center">
        <p id="empty-cart-message">Your cart is empty</p>
      </div>
    </div>

    <div class="row mt-4">
      <div class="col-12 text-center">
        <button id="clear-cart" class="btn btn-danger me-2">Clear Cart</button>
        <a href="companies.html" class="btn btn-success">Continue Applying</a>
      </div>
    </div>
  </div>

  <!-- Include the footer -->
  <div id="footer-placeholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Load the header
    fetch('header.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('header-placeholder').innerHTML = data;
      });
      
    // Load the footer
    fetch('footer.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('footer-placeholder').innerHTML = data;
      });
  </script>
  <script src="assets/auth.js"></script>
  <script src="assets/cart.js"></script>
</body>

</html>
